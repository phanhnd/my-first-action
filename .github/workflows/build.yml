name: Build my simple app
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Compile my program
        run: cl main.cpp
      
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: main.exe
